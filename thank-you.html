<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Thanks — VideoBrews</title>
  <meta name="robots" content="noindex" />
  <link rel="icon" type="image/svg+xml" href="assets/videobrews-icon-dark.svg" />
  <link rel="apple-touch-icon" href="assets/videobrews-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=DM+Serif+Display:ital@1&display=swap" rel="stylesheet" />
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{background:#FAF6F1;color:#15110D;font-family:'Geist',system-ui,sans-serif;min-height:100vh}
    body{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 24px;text-align:center}
    .mark{width:84px;height:84px;margin-bottom:32px;filter:drop-shadow(0 6px 18px rgba(255,89,0,.2))}
    h1{font-size:clamp(2.5rem,6vw,4rem);font-weight:700;letter-spacing:-.02em;line-height:1.05;margin-bottom:20px}
    .serif-it{font-family:'DM Serif Display',serif;font-style:italic;color:#FF5900;font-weight:400}
    .lead{font-size:1.15rem;color:#5e564e;max-width:560px;margin:0 auto 36px;line-height:1.6}
    .meta{font-family:'Geist Mono',ui-monospace,monospace;font-size:0.8rem;letter-spacing:.08em;text-transform:uppercase;color:#8a7f73;margin-bottom:8px}
    .actions{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-top:8px}
    .btn{display:inline-flex;align-items:center;gap:10px;padding:14px 24px;border-radius:999px;font-weight:600;font-size:0.95rem;text-decoration:none;transition:transform .2s ease,box-shadow .2s ease,background .2s ease}
    .btn-primary{background:#15110D;color:#FAF6F1;border:1px solid #15110D}
    .btn-primary:hover{transform:translateY(-2px);box-shadow:0 12px 24px rgba(21,17,13,.18)}
    .btn-ghost{background:transparent;color:#15110D;border:1px solid rgba(21,17,13,.2)}
    .btn-ghost:hover{background:rgba(21,17,13,.06)}
  </style>
</head>
<body>
  <svg class="mark" viewBox="0 0 26 26">
    <g fill="none" stroke="#0A0A0A" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <path d="m2.681 14.82 3.363 3.07"/>
      <path d="m1 16.201 9.325 8.599c.255.204.917.43 1.529-.307l4.127-4.453"/>
      <path d="M25 10.98 14.605 1.2c-.255-.204-.917-.43-1.529.307L10.983 3.61"/>
      <path d="m5.546 8.335-.658-.728c-.344-.594-.058-.92.371-1.408l2.012-2.127c.19-.217.7-.567 1.21-.23l.974.862"/>
    </g>
    <circle cx="13" cy="13" r="6.2" fill="#FF5900"/>
    <path fill="#FFFFFF" d="M11.2 9.6 17 13l-5.8 3.4z"/>
  </svg>
  <p class="meta">● Request received</p>
  <h1>Thanks — we got<br/>your <span class="serif-it">request.</span></h1>
  <p class="lead">A member of our team is reviewing your details and will reach out at the email you provided within 1 business day with next steps for your free consultation.</p>
  <div class="actions">
    <a href="index.html" class="btn btn-primary">Back to home</a>
    <a href="portfolio.html" class="btn btn-ghost">See our work</a>
  </div>
</body>
</html>
