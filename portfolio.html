<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Portfolio — VideoBrews</title>
  <meta name="description" content="Browse the full VideoBrews video portfolio — restaurants, wellness, real estate, brand stories, music videos and AI short films." />

  <link rel="icon" type="image/svg+xml" href="assets/videobrews-icon-dark.svg" />
  <link rel="apple-touch-icon" href="assets/videobrews-icon.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://images.unsplash.com" />
  <link rel="preconnect" href="https://static.wixstatic.com" />
  <link rel="preconnect" href="https://video.wixstatic.com" />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800;900&amp;family=Geist+Mono:wght@400;500&amp;family=Instrument+Serif:ital@0;1&amp;family=DM+Serif+Display:ital@0;1&amp;display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles.css" />
  <style>
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
    html { background: #FAF6F1; }
    /* Pre-React loading splash — animated shake */
    .splash {
      position: fixed; inset: 0; z-index: 999;
      display: grid; place-items: center;
      background: #FAF6F1;
      opacity: 1;
      transition: opacity .4s ease, visibility .4s;
    }
    body.loaded .splash {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }
    .splash-mark {
      width: 84px; height: 84px;
      transform-origin: center;
      animation: splash-breathe 1.4s ease-in-out infinite;
      filter: drop-shadow(0 8px 24px rgba(255, 89, 0, 0.25));
    }
    .splash-mark .sp-frame {
      stroke-dasharray: 80;
      stroke-dashoffset: 80;
      animation: splash-draw 0.9s cubic-bezier(.65, 0, .35, 1) infinite;
    }
    .splash-mark .sp-disc {
      transform-origin: 13px 13px;
      animation: splash-pulse 0.9s cubic-bezier(.4, 0, .2, 1) infinite;
    }
    .splash-mark .sp-tri {
      transform-origin: 13px 13px;
      opacity: 0;
      animation: splash-fade-tri 0.9s ease infinite;
    }
    @keyframes splash-draw {
      0%   { stroke-dashoffset: 80; }
      55%  { stroke-dashoffset: 0; }
      100% { stroke-dashoffset: 0; }
    }
    @keyframes splash-pulse {
      0%, 55%   { transform: scale(0); opacity: 0; }
      72%       { transform: scale(1.15); opacity: 1; }
      85%, 100% { transform: scale(1); opacity: 1; }
    }
    @keyframes splash-fade-tri {
      0%, 70% { opacity: 0; transform: translateX(-1px) scale(0.6); }
      85%     { opacity: 1; transform: translateX(0) scale(1); }
      100%    { opacity: 1; transform: translateX(0) scale(1); }
    }
    @keyframes splash-breathe {
      0%, 100% { transform: scale(1); }
      50%      { transform: scale(1.06); }
    }
  </style>
</head>
<body>
  <div class="splash" aria-hidden="true">
    <svg class="splash-mark" viewBox="0 0 26 26">
      <g class="sp-frame" fill="none" stroke="#0A0A0A" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <path d="m2.681 14.82 3.363 3.07"></path>
        <path d="m1 16.201 9.325 8.599c.255.204.917.43 1.529-.307l4.127-4.453"></path>
        <path d="M25 10.98 14.605 1.2c-.255-.204-.917-.43-1.529.307L10.983 3.61"></path>
        <path d="m5.546 8.335-.658-.728c-.344-.594-.058-.92.371-1.408l2.012-2.127c.19-.217.7-.567 1.21-.23l.974.862"></path>
      </g>
      <circle class="sp-disc" cx="13" cy="13" r="6.2" fill="#FF5900"></circle>
      <path class="sp-tri" fill="#FFFFFF" d="M11.2 9.6 17 13l-5.8 3.4z"></path>
    </svg>
  </div>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="portfolio-data.js"></script>
  <script type="text/babel" src="shared.jsx"></script>
  <script type="text/babel" src="portfolio.jsx"></script>
  <script>
    (function () {
      const root = document.getElementById('root');
      const mo = new MutationObserver(() => {
        if (root.children.length > 0) {
          requestAnimationFrame(() => document.body.classList.add('loaded'));
          mo.disconnect();
        }
      });
      mo.observe(root, { childList: true });
    })();
  </script>
</body>
</html>
