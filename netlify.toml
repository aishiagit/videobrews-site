# VideoBrews — Netlify configuration

[build]
  publish = "."

# Headers — long cache on static assets, no cache on HTML (so updates show immediately)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Force /blog → blog subdomain even if a file with that name exists
[[redirects]]
  from = "/blog"
  to = "https://blog.videobrews.com"
  status = 301
  force = true

[[redirects]]
  from = "/blog/*"
  to = "https://blog.videobrews.com/:splat"
  status = 301
  force = true
