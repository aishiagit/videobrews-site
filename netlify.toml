# VideoBrews — Netlify configuration

[build]
  publish = "."

# Headers — moderate cache on static assets (browsers re-check after 10 min)
# We don't use content hashing in filenames, so we can't safely mark assets immutable.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=600, must-revalidate"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Force /blog → blog subdomain even if a file with that name exists
[[redirects]]
  from = "/blog"
  to = "https://www.videobrews.com/blog"
  status = 301
  force = true

[[redirects]]
  from = "/blog/*"
  to = "https://www.videobrews.com/blog/:splat"
  status = 301
  force = true
